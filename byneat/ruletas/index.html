<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neat Ruletas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
    --text: #f0f0f0; --text2: #999; --text3: #555;
    --accent: #f97316; --accent2: #ea580c;
    --green: #22c55e; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  #user-badge { font-size: 13px; color: var(--text2); }

  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 20px; font-size: 14px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .view.active { display: block; }

  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  input, textarea, select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; width: 100%;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }
  label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; }

  .field { margin-bottom: 14px; }

  /* Ruleta canvas */
  .ruleta-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; margin: 20px 0; }
  canvas { border-radius: 50%; cursor: pointer; }
  .spin-btn { width: 140px; }

  /* Resultado */
  .resultado { text-align: center; padding: 16px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); }
  .resultado .valor { font-size: 24px; font-weight: 700; color: var(--accent); }

  /* Opciones editor */
  .opciones-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .opcion-row { display: flex; gap: 8px; align-items: center; }
  .opcion-row input { flex: 1; }
  .color-dot { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; flex-shrink: 0; }

  /* Mis ruletas */
  .ruleta-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: border-color .2s; }
  .ruleta-card:hover { border-color: var(--accent); }
  .ruleta-card h3 { font-size: 15px; font-weight: 500; }
  .ruleta-card span { font-size: 12px; color: var(--text2); }
  .card-actions { display: flex; gap: 6px; }

  /* Auth */
  .auth-card { max-width: 360px; margin: 60px auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .auth-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 20px; text-align: center; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .plus-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .empty { text-align: center; color: var(--text3); padding: 40px 0; font-size: 14px; }

  #arrow { font-size: 28px; line-height: 1; }
</style>
</head>
<body>

<header>
  <h1>Neat <span>Ruletas</span></h1>
  <div class="header-actions">
    <span id="user-badge"></span>
    <button class="btn btn-outline btn-sm" onclick="logout()" id="logout-btn" style="display:none">Salir</button>
  </div>
</header>

<!-- AUTH -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <h2>Iniciar sesión</h2>
    <div class="field"><label>Usuario</label><input id="auth-user" placeholder="@usuario"></div>
    <div class="field"><label>Contraseña</label><input id="auth-pass" type="password" placeholder="••••••"></div>
    <button class="btn btn-accent" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('girar')">🎡 Girar</div>
    <div class="tab" onclick="switchTab('mis')">📋 Mis ruletas</div>
    <div class="tab" onclick="switchTab('crear')">＋ Nueva</div>
  </div>

  <!-- GIRAR -->
  <div class="view active" id="view-girar">
    <div id="no-ruleta" class="empty">Crea o selecciona una ruleta para girar</div>
    <div id="ruleta-activa" style="display:none">
      <div class="ruleta-wrap">
        <div id="arrow">▼</div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <button class="btn btn-accent spin-btn" onclick="girar()" id="spin-btn">Girar</button>
      </div>
      <div class="resultado" id="resultado" style="display:none">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Resultado</div>
        <div class="valor" id="resultado-valor"></div>
      </div>
    </div>
  </div>

  <!-- MIS RULETAS -->
  <div class="view" id="view-mis">
    <div id="mis-lista"></div>
  </div>

  <!-- CREAR / EDITAR -->
  <div class="view" id="view-crear">
    <div class="field"><label>Nombre</label><input id="r-nombre" placeholder="Mi ruleta"></div>
    <div class="field">
      <label>Opciones</label>
      <div class="opciones-list" id="opciones-list"></div>
      <button class="btn btn-outline btn-sm" onclick="addOpcion()">+ Agregar opción</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-accent" onclick="guardarRuleta()" style="flex:1">Guardar</button>
      <button class="btn btn-outline" onclick="cancelarEditar()" id="btn-cancelar" style="display:none">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://neat-apps-b.vercel.app';
let token = localStorage.getItem('neat_token');
let user = null;
let hasPlus = false;
let ruletaActual = null;
let editandoId = null;
let girando = false;

const COLORES_DEFAULT = ['#f97316','#3b82f6','#22c55e','#a855f7','#ef4444','#eab308','#ec4899','#14b8a6'];

async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { ...opts, headers: h });
  return r.json();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function init() {
  if (!token) { showAuth(); return; }
  const me = await api('/chat/me');
  if (me.error) { showAuth(); return; }
  user = me; hasPlus = !!me.neatPlus || me.role === 'admin';
  document.getElementById('user-badge').textContent = '@' + me.username + (hasPlus ? ' ✦' : '');
  document.getElementById('logout-btn').style.display = '';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = '';
  cargarMisRuletas();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('main-screen').style.display = 'none';
}

async function doLogin() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  const d = await api('/chat/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
  if (d.token) { token = d.token; localStorage.setItem('neat_token', token); init(); }
  else toast(d.error || 'Error al iniciar sesión');
}

function logout() {
  localStorage.removeItem('neat_token'); token = null; user = null;
  showAuth();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['girar','mis','crear'][i] === t));
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + t).classList.add('active');
  if (t === 'mis') cargarMisRuletas();
  if (t === 'crear' && !editandoId) resetCrear();
}

// ── Canvas ruleta ──────────────────────────────────────────────────────────────
function dibujarRuleta(opciones, colores) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const n = opciones.length;
  const arc = (2 * Math.PI) / n;
  const r = 145;
  ctx.clearRect(0, 0, 300, 300);
  opciones.forEach((op, i) => {
    const ang = arc * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(150, 150);
    ctx.arc(150, 150, r, ang, ang + arc);
    ctx.fillStyle = (colores && colores[i]) || COLORES_DEFAULT[i % COLORES_DEFAULT.length];
    ctx.fill();
    ctx.strokeStyle = '#0f0f0f'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save();
    ctx.translate(150, 150);
    ctx.rotate(ang + arc / 2);
    ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
    ctx.font = `${Math.min(14, 120 / n)}px Inter`;
    const txt = op.length > 12 ? op.slice(0, 12) + '…' : op;
    ctx.fillText(txt, r - 10, 5);
    ctx.restore();
  });
}

function cargarRuletaEnCanvas(ruleta) {
  ruletaActual = ruleta;
  document.getElementById('no-ruleta').style.display = 'none';
  document.getElementById('ruleta-activa').style.display = '';
  document.getElementById('resultado').style.display = 'none';
  dibujarRuleta(ruleta.opciones, ruleta.colores);
}

function girar() {
  if (girando || !ruletaActual) return;
  girando = true;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true; btn.textContent = 'Girando…';

  const opciones = ruletaActual.opciones;
  const idx = Math.floor(Math.random() * opciones.length);
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const arc = (2 * Math.PI) / opciones.length;

  let rot = 0;
  const total = (Math.PI * 2 * 5) + (arc * idx) + arc / 2 + (Math.PI * 3 / 2);
  let start = null;
  const dur = 3000;

  function step(ts) {
    if (!start) start = ts;
    const prog = Math.min((ts - start) / dur, 1);
    const ease = 1 - Math.pow(1 - prog, 4);
    rot = total * ease;

    ctx.clearRect(0, 0, 300, 300);
    ctx.save(); ctx.translate(150, 150); ctx.rotate(rot); ctx.translate(-150, -150);
    dibujarRuleta(opciones, ruletaActual.colores);
    ctx.restore();

    if (prog < 1) { requestAnimationFrame(step); return; }

    girando = false;
    btn.disabled = false; btn.textContent = 'Girar';
    const res = opciones[idx];
    document.getElementById('resultado-valor').textContent = res;
    document.getElementById('resultado').style.display = '';
    api('/ruletas/' + ruletaActual.ruletaId + '/girar', { method: 'POST', body: JSON.stringify({ resultado: res }) });
  }
  requestAnimationFrame(step);
}

// ── Mis ruletas ───────────────────────────────────────────────────────────────
async function cargarMisRuletas() {
  const lista = document.getElementById('mis-lista');
  lista.innerHTML = '<div class="empty">Cargando…</div>';
  const data = await api('/ruletas/me/list');
  if (!data.length) { lista.innerHTML = '<div class="empty">No tienes ruletas aún</div>'; return; }
  lista.innerHTML = '';
  data.forEach(r => {
    const d = document.createElement('div');
    d.className = 'ruleta-card';
    d.innerHTML = `
      <div onclick="abrirRuleta('${r.ruletaId}')" style="flex:1">
        <h3>${r.nombre}</h3>
        <span>${r.opciones.length} opciones</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-outline btn-sm" onclick="editarRuleta('${r.ruletaId}');event.stopPropagation()">Editar</button>
        <button class="btn btn-red btn-sm" onclick="eliminarRuleta('${r.ruletaId}');event.stopPropagation()">✕</button>
      </div>`;
    lista.appendChild(d);
  });
}

async function abrirRuleta(id) {
  const r = await api('/ruletas/' + id);
  cargarRuletaEnCanvas(r);
  switchTab('girar');
}

async function eliminarRuleta(id) {
  if (!confirm('¿Eliminar esta ruleta?')) return;
  await api('/ruletas/' + id, { method: 'DELETE' });
  toast('Ruleta eliminada'); cargarMisRuletas();
}

// ── Crear / Editar ─────────────────────────────────────────────────────────────
function resetCrear() {
  editandoId = null;
  document.getElementById('r-nombre').value = '';
  document.getElementById('btn-cancelar').style.display = 'none';
  document.getElementById('opciones-list').innerHTML = '';
  addOpcion('Opción 1'); addOpcion('Opción 2');
}

function addOpcion(val = '') {
  const list = document.getElementById('opciones-list');
  const idx = list.children.length;
  const row = document.createElement('div');
  row.className = 'opcion-row';
  const colorVal = COLORES_DEFAULT[idx % COLORES_DEFAULT.length];
  row.innerHTML = `
    <input type="text" placeholder="Opción ${idx + 1}" value="${val}">
    ${hasPlus ? `<input type="color" class="color-dot" value="${colorVal}" title="Color (Plus)">` : ''}
    <button class="btn btn-outline btn-sm" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}

async function editarRuleta(id) {
  const r = await api('/ruletas/' + id);
  editandoId = id;
  document.getElementById('r-nombre').value = r.nombre;
  const list = document.getElementById('opciones-list');
  list.innerHTML = '';
  r.opciones.forEach((op, i) => {
    const row = document.createElement('div');
    row.className = 'opcion-row';
    const c = (r.colores && r.colores[i]) || COLORES_DEFAULT[i % COLORES_DEFAULT.length];
    row.innerHTML = `
      <input type="text" value="${op}">
      ${hasPlus ? `<input type="color" class="color-dot" value="${c}">` : ''}
      <button class="btn btn-outline btn-sm" onclick="this.parentElement.remove()">✕</button>`;
    list.appendChild(row);
  });
  document.getElementById('btn-cancelar').style.display = '';
  switchTab('crear');
}

function cancelarEditar() { editandoId = null; resetCrear(); switchTab('mis'); }

async function guardarRuleta() {
  const nombre = document.getElementById('r-nombre').value.trim() || 'Mi ruleta';
  const rows = document.getElementById('opciones-list').querySelectorAll('.opcion-row');
  const opciones = [...rows].map(r => r.querySelector('input[type=text]').value.trim()).filter(Boolean);
  if (opciones.length < 2) { toast('Mínimo 2 opciones'); return; }

  let colores = null;
  if (hasPlus) {
    colores = [...rows].map(r => r.querySelector('input[type=color]')?.value || null);
  }

  const body = JSON.stringify({ nombre, opciones, colores });
  const path = editandoId ? `/ruletas/${editandoId}` : '/ruletas';
  const method = editandoId ? 'PUT' : 'POST';
  const d = await api(path, { method, body });
  if (d.error) { toast(d.error); return; }

  toast(editandoId ? 'Ruleta actualizada' : 'Ruleta creada');
  const id = editandoId || d.ruletaId;
  editandoId = null;
  resetCrear();
  abrirRuleta(id);
}

init();
</script>
</body>
</html>
