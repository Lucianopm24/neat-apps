<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neat Chatter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --blue-dark: #0C447C;
    --bg: #ffffff;
    --bg2: #f5f7fa;
    --bg3: #eef1f5;
    --text: #1a1a2e;
    --text2: #5a6070;
    --text3: #9099a8;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --bubble-me: #185FA5;
    --bubble-me-text: #ffffff;
    --bubble-them: #eef1f5;
    --bubble-them-text: #1a1a2e;
    --radius: 12px;
    --sidebar-w: 300px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --bg2: #181c27;
      --bg3: #222636;
      --text: #e8eaf0;
      --text2: #8b91a8;
      --text3: #555e78;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --bubble-them: #222636;
      --bubble-them-text: #e8eaf0;
      --blue-light: #0c1e35;
    }
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

  /* ── Auth ── */
  #auth-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
  }
  .auth-card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
  }
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .auth-logo-icon {
    width: 40px;
    height: 40px;
    background: var(--blue);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
  }
  .auth-logo h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .auth-logo span { font-size: 13px; color: var(--text3); }
  .auth-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border2);
    margin-bottom: 1.5rem;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: all 0.15s;
  }
  .auth-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
  .auth-field { margin-bottom: 1rem; }
  .auth-field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .auth-field input {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    background: var(--bg2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .auth-field input:focus { border-color: var(--blue); }
  .email-preview {
    font-size: 12px;
    color: var(--blue);
    margin-top: 6px;
    min-height: 16px;
  }
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error { font-size: 13px; color: #e24b4a; margin-top: 10px; text-align: center; min-height: 20px; }

  /* ── App layout ── */
  #app { display: none; height: 100vh; }
  #app.visible { display: flex; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-header h2 { font-size: 17px; font-weight: 600; flex: 1; color: var(--text); }
  .icon-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }
  .search-wrap { padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    font-size: 13px;
    background: var(--bg2);
    color: var(--text);
    outline: none;
  }
  .search-wrap { position: relative; }
  .search-wrap .ti-search {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
  }
  #chat-list { flex: 1; overflow-y: auto; }
  .chat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 0.5px solid var(--border);
  }
  .chat-item:hover { background: var(--bg2); }
  .chat-item.active { background: var(--blue-light); }
  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
    overflow: hidden;
  }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .chat-item-info { flex: 1; min-width: 0; }
  .chat-item-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item-last { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .chat-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .chat-item-time { font-size: 11px; color: var(--text3); }
  .unread-badge {
    background: var(--blue);
    color: #fff;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    min-width: 18px;
    text-align: center;
  }
  .sidebar-user {
    padding: 12px 14px;
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .sidebar-user:hover { background: var(--bg2); }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-user-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .sidebar-user-email { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Main panel ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
  }
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 12px;
  }
  #empty-state i { font-size: 48px; color: var(--border2); }
  #empty-state p { font-size: 15px; }

  /* ── Chat panel ── */
  #chat-panel { display: none; flex-direction: column; height: 100vh; }
  #chat-panel.visible { display: flex; }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
  }
  .chat-header-info { flex: 1; cursor: pointer; }
  .chat-header-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .chat-header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--bg2);
  }
  .msg-group { display: flex; flex-direction: column; margin-bottom: 8px; }
  .msg-group.me { align-items: flex-end; }
  .msg-group.them { align-items: flex-start; }
  .msg-sender {
    font-size: 11px;
    color: var(--blue);
    font-weight: 500;
    margin-bottom: 3px;
    padding: 0 12px;
  }
  .bubble {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  .me .bubble {
    background: var(--bubble-me);
    color: var(--bubble-me-text);
    border-bottom-right-radius: 4px;
  }
  .them .bubble {
    background: var(--bubble-them);
    color: var(--bubble-them-text);
    border-bottom-left-radius: 4px;
  }
  .bubble-time {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
    padding: 0 4px;
  }
  .me .bubble-time { text-align: right; }

  /* ── Media bubbles ── */
  .bubble-img { max-width: 260px; border-radius: 10px; cursor: pointer; display: block; margin: 2px 0; }
  .bubble-video { max-width: 260px; border-radius: 10px; display: block; }
  .bubble-audio { width: 220px; }
  .bubble-doc {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .bubble-doc i { font-size: 22px; opacity: 0.8; }
  .bubble-doc-info { flex: 1; }
  .bubble-doc-name { font-size: 13px; font-weight: 500; }
  .bubble-doc-size { font-size: 11px; opacity: 0.6; }
  .bubble-doc a { font-size: 12px; color: inherit; opacity: 0.7; text-decoration: none; }
  .media-loading {
    width: 200px;
    height: 120px;
    background: rgba(0,0,0,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    opacity: 0.6;
  }

  /* ── Input ── */
  .chat-input-area {
    padding: 10px 12px;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .input-wrap {
    flex: 1;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    background: var(--bg2);
    display: flex;
    align-items: flex-end;
    padding: 6px 12px;
    gap: 8px;
  }
  #msg-input {
    flex: 1;
    border: none;
    background: none;
    outline: none;
    font-size: 14px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    font-family: inherit;
  }
  #msg-input::placeholder { color: var(--text3); }
  .attach-btn { color: var(--text3); font-size: 20px; cursor: pointer; flex-shrink: 0; padding: 2px; }
  .attach-btn:hover { color: var(--blue); }
  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Attach preview ── */
  #attach-preview {
    padding: 8px 14px;
    border-top: 0.5px solid var(--border);
    background: var(--bg);
    display: none;
    align-items: center;
    gap: 10px;
  }
  #attach-preview.visible { display: flex; }
  .attach-preview-thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--text3);
    flex-shrink: 0;
    overflow: hidden;
  }
  .attach-preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .attach-preview-info { flex: 1; min-width: 0; }
  .attach-preview-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .attach-preview-size { font-size: 11px; color: var(--text3); }
  .attach-preview-progress { height: 3px; background: var(--border2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .attach-preview-bar { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; border-radius: 2px; }

  /* ── Modals ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.visible { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    margin: 1rem;
  }
  .modal-header {
    padding: 16px 18px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header h3 { flex: 1; font-size: 16px; font-weight: 600; }
  .modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 12px 18px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .btn-secondary {
    padding: 8px 16px;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    background: none;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .btn-blue {
    padding: 8px 16px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%;
    padding: 9px 12px;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    background: var(--bg2);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus { border-color: var(--blue); }
  .user-select-list { max-height: 200px; overflow-y: auto; border: 0.5px solid var(--border); border-radius: 8px; }
  .user-select-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  .user-select-item:last-child { border-bottom: none; }
  .user-select-item:hover { background: var(--bg2); }
  .user-select-item.selected { background: var(--blue-light); }
  .user-select-item input[type=checkbox] { accent-color: var(--blue); }
  .user-avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    overflow: hidden;
  }
  .user-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Profile modal ── */
  .profile-avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .profile-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 28px;
    font-weight: 600;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-avatar-hint { font-size: 12px; color: var(--text3); }
  .profile-email { font-size: 13px; color: var(--blue); text-align: center; margin-bottom: 1rem; }
  .role-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .role-badge.admin { background: #faeeda; color: #633806; }
  .role-badge.user { background: var(--blue-light); color: var(--blue-dark); }

  /* ── Image viewer ── */
  #img-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
  }
  #img-viewer.visible { display: flex; }
  #img-viewer img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a2e;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Loading ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    margin: 0 2px;
    animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="ti ti-message-circle"></i></div>
      <div>
        <h1>Neat Chatter</h1>
        <span>Mensajería de Neat</span>
      </div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</div>
      <div class="auth-tab" onclick="switchTab('register')">Registrarse</div>
    </div>
    <div class="auth-field">
      <label>Usuario</label>
      <input type="text" id="auth-username" placeholder="tu_usuario" autocomplete="username" oninput="updateEmailPreview()">
    </div>
    <div class="auth-field">
      <label>Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()">
    </div>
    <div class="email-preview" id="email-preview"></div>
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">Iniciar sesión</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Chats</h2>
      <button class="icon-btn" onclick="openNewChat()" title="Nuevo chat" aria-label="Nuevo chat"><i class="ti ti-edit"></i></button>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" placeholder="Buscar chats..." oninput="filterChats(this.value)">
    </div>
    <div id="chat-list"></div>
    <div class="sidebar-user" onclick="openProfile()">
      <div class="chat-avatar" id="sidebar-avatar"></div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-username"></div>
        <div class="sidebar-user-email" id="sidebar-email"></div>
      </div>
      <button class="icon-btn" onclick="event.stopPropagation();logout()" title="Cerrar sesión" aria-label="Cerrar sesión"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="empty-state">
      <i class="ti ti-messages"></i>
      <p>Seleccioná un chat para comenzar</p>
    </div>

    <div id="chat-panel">
      <div class="chat-header">

        <div class="chat-header-info" onclick="openChatInfo()">
          <div class="chat-header-name" id="chat-header-name"></div>

        <div class="attach-preview-info">

          <div class="attach-preview-progress"><div class="attach-preview-bar" id="attach-bar"></div></div>
        </div>

      </div>

      <div class="chat-input-area">

          <label class="attach-btn" title="Adjuntar archivo" aria-label="Adjuntar archivo">

  <img id="img-viewer-img" alt="imagen">
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = "https://neat-apps-b.vercel.app";
let token = localStorage.getItem("nc_token");
let currentUser = null;
let chats = [];
let activeChat = null;
let allUsers = [];
let selectedUsers = [];
let pendingFile = null;
let pollInterval = null;
let lastMessageTime = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
let authMode = "login";

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll(".auth-tab").forEach((t, i) => {
    t.classList.toggle("active", (i === 0) === (mode === "login"));
  });
  document.getElementById("auth-btn").textContent = mode === "login" ? "Iniciar sesión" : "Crear cuenta";
  document.getElementById("email-preview").textContent = "";
  document.getElementById("auth-error").textContent = "";
  if (mode === "register") updateEmailPreview();
}

function updateEmailPreview() {
  if (authMode !== "register") return;
  const u = document.getElementById("auth-username").value.trim().toLowerCase();
  document.getElementById("email-preview").textContent = u ? `Tu email: ${u}@neat.qzz.io` : "";
}

async function doAuth() {
  const username = document.getElementById("auth-username").value.trim();
  const password = document.getElementById("auth-password").value;
  const btn = document.getElementById("auth-btn");
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  if (!username || !password) { errEl.textContent = "Completá todos los campos"; return; }
  btn.disabled = true;
  btn.textContent = "...";
  try {
    const endpoint = authMode === "login" ? "/chat/login" : "/chat/register";
    const res = await fetch(API + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || "Error"; return; }
    token = data.token;
    localStorage.setItem("nc_token", token);
    currentUser = { username: data.username, email: data.email, role: data.role };
    await initApp();
  } catch { errEl.textContent = "Error de conexión"; }
  finally { btn.disabled = false; btn.textContent = authMode === "login" ? "Iniciar sesión" : "Crear cuenta"; }
}

function logout() {
  localStorage.removeItem("nc_token");
  token = null;
  currentUser = null;
  activeChat = null;
  clearInterval(pollInterval);
  document.getElementById("app").classList.remove("visible");
  document.getElementById("auth-screen").style.display = "flex";
  document.getElementById("auth-username").value = "";
  document.getElementById("auth-password").value = "";
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").classList.add("visible");
  renderSidebarUser();
  await loadChats();
  await loadUsers();
  setupPush();
  setupServiceWorker();
  // Abrir chat desde URL param o push notification
  const params = new URLSearchParams(location.search);
  if (params.get("chat")) openChat(params.get("chat"));
}

async function checkToken() {
  if (!token) return;
  try {
    const res = await fetch(API + "/chat/me", { headers: { Authorization: "Bearer " + token } });
    if (!res.ok) { localStorage.removeItem("nc_token"); token = null; return; }
    currentUser = await res.json();
    await initApp();
  } catch {}
}

// ── Sidebar user ──────────────────────────────────────────────────────────────
function renderSidebarUser() {
  document.getElementById("sidebar-username").textContent = currentUser.username;
isVerified(currentUser.username).then(v => {
  if (v) document.getElementById("sidebar-username").innerHTML = esc(currentUser.username) + verifiedBadge();
});
  document.getElementById("sidebar-email").textContent = currentUser.email || "";
  const av = document.getElementById("sidebar-avatar");
  av.textContent = currentUser.username[0].toUpperCase();
  if (currentUser.avatarFileId) loadAvatar(currentUser.avatarFileId, av);
}

// ── Chats ─────────────────────────────────────────────────────────────────────
async function loadChats() {
  try {
    const res = await fetch(API + "/chat/chats", { headers: { Authorization: "Bearer " + token } });
    chats = await res.json();
    renderChatList(chats);
  } catch {}
}

function renderChatList(list) {
  const el = document.getElementById("chat-list");
  if (!list.length) { el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Sin chats aún</div>`; return; }
  el.innerHTML = list.map(c => {
    const name = chatName(c);
    const initials = name[0].toUpperCase();
    const isActive = activeChat?._id === c._id?.toString();
    return `<div class="chat-item${isActive ? " active" : ""}" onclick="openChat('${c._id}')">
      <div class="chat-avatar">${initials}</div>
      <div class="chat-item-info">
        <div class="chat-item-name" id="chat-name-${c._id}">${esc(name)}</div>
        <div class="chat-item-last">${esc(c.lastMessage || "Sin mensajes")}</div>
      </div>
      <div class="chat-item-meta">
        <div class="chat-item-time">${c.updatedAt ? fmtTime(c.updatedAt) : ""}</div>
      </div>
    </div>`;
  })
   .join("");

 list.forEach(c => {
  const name = chatName(c);
  if (c.type === "direct") {
    const other = c.participants?.find(p => p !== (currentUser.userId || currentUser.username));
const otherUsername = allUsers.find(u => u._id === other || u.username === other)?.username || other;
if (otherUsername) isVerified(otherUsername).then(v => {
      const el = document.getElementById(`chat-name-${c._id}`);
      if (el && v) el.innerHTML = esc(name) + verifiedBadge();
    });
  }
});
}

function filterChats(q) {
  const filtered = q ? chats.filter(c => chatName(c).toLowerCase().includes(q.toLowerCase())) : chats;
  renderChatList(filtered);
}

function chatName(c) {
  if (c.name) return c.name;
  if (c.type === "direct") {
    const other = c.participants?.find(p => p !== (currentUser.userId || currentUser.username)) || c.participants?.[0];
    const u = allUsers.find(u => u._id?.toString() === other || u.username === other);
    return u ? u.username : other || "Chat";
  }
  return "Grupo";
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(id) {
  const chat = chats.find(c => c._id?.toString() === id?.toString()) || { _id: id };
  activeChat = chat;
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("chat-panel").classList.add("visible");
  const name = chatName(chat);
  document.getElementById("chat-header-name").textContent = name;
if (chat.type === "direct") {
  const other = chat.participants?.find(p => p !== (currentUser.userId || currentUser.username));
  const otherUsername = allUsers.find(u => u._id === other || u.username === other)?.username || other;
  if (otherUsername) isVerified(otherUsername).then(v => {
    if (v) document.getElementById("chat-header-name").innerHTML = esc(name) + verifiedBadge();
  });
}
  document.getElementById("chat-header-avatar").textContent = name[0].toUpperCase();
  document.getElementById("chat-header-sub").textContent = chat.type === "group" ? `${chat.participants?.length || ""} participantes` : chat.participants?.find(p => p !== (currentUser.userId || currentUser.username)) || "";
  document.getElementById("messages").innerHTML = `<div style="padding:40px;display:flex;justify-content:center"><div class="spinner"></div></div>`;
  renderChatList(chats);
  clearInterval(pollInterval);
  await fetchMessages(id);
  pollInterval = setInterval(() => pollMessages(id), 30000);
}

async function fetchMessages(chatId) {
  try {
    const res = await fetch(`${API}/chat/messages/${chatId}?limit=50`, { headers: { Authorization: "Bearer " + token } });
    const msgs = await res.json();
    renderMessages(msgs);
    if (msgs.length) lastMessageTime = msgs[msgs.length - 1].createdAt;
  } catch {
    document.getElementById("messages").innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Error cargando mensajes</div>`;
  }
}

async function pollMessages(chatId) {
  if (!lastMessageTime || activeChat?._id?.toString() !== chatId?.toString()) return;
  try {
    const res = await fetch(`${API}/chat/messages/${chatId}/since?since=${encodeURIComponent(lastMessageTime)}`, { headers: { Authorization: "Bearer " + token } });
    const msgs = await res.json();
    if (msgs.length) {
      appendMessages(msgs);
      lastMessageTime = msgs[msgs.length - 1].createdAt;
      await loadChats();
    }
  } catch {}
}

// ── Render messages ───────────────────────────────────────────────────────────
function renderMessages(msgs) {
  const el = document.getElementById("messages");
  el.innerHTML = "";
  if (!msgs.length) { el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Sin mensajes aún. ¡Decí hola!</div>`; return; }
  msgs.forEach(m => el.appendChild(buildMsgEl(m)));
  el.scrollTop = el.scrollHeight;
}

function appendMessages(msgs) {
  const el = document.getElementById("messages");
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
  msgs.forEach(m => el.appendChild(buildMsgEl(m)));
  if (atBottom) el.scrollTop = el.scrollHeight;
}

function buildMsgEl(m) {
  const myId = currentUser.userId || currentUser.username;
  const isMe = m.senderId === myId || m.senderUsername === currentUser.username;
  const group = document.createElement("div");
  group.className = `msg-group ${isMe ? "me" : "them"}`;
  if (!isMe && activeChat?.type === "group") {
  const senderEl = document.createElement("div");
  senderEl.className = "msg-sender";
  senderEl.textContent = m.senderUsername;
  group.appendChild(senderEl);
  isVerified(m.senderUsername).then(v => {
    if (v) senderEl.innerHTML = esc(m.senderUsername) + verifiedBadge();
  });
}
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.appendChild(buildContent(m));
  const time = document.createElement("div");
  time.className = "bubble-time";
  time.textContent = fmtTime(m.createdAt);
  group.appendChild(bubble);
  group.appendChild(time);
  return group;
}

function buildContent(m) {
  const wrap = document.createElement("div");
  if (m.type === "text" || !m.telegramFileId) {
    wrap.textContent = m.content;
    return wrap;
  }
  const loading = document.createElement("div");
  loading.className = "media-loading";
  loading.innerHTML = `<div class="spinner"></div>`;
  wrap.appendChild(loading);
  resolveFile(m.telegramFileId).then(url => {
    loading.remove();
    if (m.type === "photo") {
      const img = document.createElement("img");
      img.className = "bubble-img";
      img.src = url;
      img.alt = "imagen";
      img.onclick = () => openImgViewer(url);
      wrap.appendChild(img);
    } else if (m.type === "video") {
      const v = document.createElement("video");
      v.className = "bubble-video";
      v.src = url; v.controls = true;
      wrap.appendChild(v);
    } else if (m.type === "audio" || m.type === "voice") {
      const a = document.createElement("audio");
      a.className = "bubble-audio";
      a.src = url; a.controls = true;
      wrap.appendChild(a);
    } else {
      wrap.innerHTML = `<div class="bubble-doc">
        <i class="ti ti-file"></i>
        <div class="bubble-doc-info">
          <div class="bubble-doc-name">${esc(m.content || "Archivo")}</div>
          <div class="bubble-doc-size">${m.mimeType || "documento"}</div>
        </div>
        <a href="${url}" download target="_blank"><i class="ti ti-download"></i></a>
      </div>`;
    }
    if (m.content && m.type !== "text") {
      const caption = document.createElement("div");
      caption.style.cssText = "font-size:13px;margin-top:4px;opacity:0.85";
      caption.textContent = m.content;
      wrap.appendChild(caption);
    }
  }).catch(() => { loading.innerHTML = `<span style="font-size:12px;opacity:0.6">Error cargando archivo</span>`; });
  return wrap;
}

async function resolveFile(fileId) {
  const res = await fetch(`${API}/chat/telegram/file/${fileId}`, { headers: { Authorization: "Bearer " + token } });
  const data = await res.json();
  return data.url;
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (!activeChat) return;
  const input = document.getElementById("msg-input");
  const content = input.value.trim();
  if (!content && !pendingFile) return;

  let fileData = null;
  if (pendingFile) {
    fileData = await uploadFile(pendingFile);
    if (!fileData) return;
  }

  const body = {
    content: content || (fileData ? pendingFile.name : null),
    type: fileData ? fileData.type : "text",
    telegramFileId: fileData?.telegramFileId || null,
    mimeType: fileData?.mimeType || null,
  };

  input.value = "";
  input.style.height = "auto";
  clearAttach();

  try {
    const res = await fetch(`${API}/chat/messages/${activeChat._id}`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify(body)
    });
    const msg = await res.json();
    appendMessages([msg]);
    lastMessageTime = msg.createdAt;
    await loadChats();
  } catch { showToast("Error enviando mensaje"); }
}

// ── File upload ───────────────────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  pendingFile = file;
  const preview = document.getElementById("attach-preview");
  preview.classList.add("visible");
  document.getElementById("attach-name").textContent = file.name;
  document.getElementById("attach-size").textContent = fmtSize(file.size);
  document.getElementById("attach-bar").style.width = "0%";
  const thumb = document.getElementById("attach-thumb");
  if (file.type.startsWith("image/")) {
    const reader = new FileReader();
    reader.onload = e => { thumb.innerHTML = `<img src="${e.target.result}" alt="">`; };
    reader.readAsDataURL(file);
  } else {
    const icon = file.type.startsWith("video/") ? "ti-video" : file.type.startsWith("audio/") ? "ti-music" : "ti-file";
    thumb.innerHTML = `<i class="ti ${icon}" style="font-size:24px"></i>`;
  }
  input.value = "";
}

async function uploadFile(file) {
  const bar = document.getElementById("attach-bar");
  const formData = new FormData();
  formData.append("file", file);
  try {
    bar.style.width = "30%";
    const res = await fetch(`${API}/chat/telegram/upload`, {
      method: "POST",
      headers: { Authorization: "Bearer " + token },
      body: formData
    });
    bar.style.width = "100%";
    if (!res.ok) { showToast("Error subiendo archivo"); return null; }
    return await res.json();
  } catch { showToast("Error subiendo archivo"); return null; }
}

function clearAttach() {
  pendingFile = null;
  document.getElementById("attach-preview").classList.remove("visible");
  document.getElementById("attach-thumb").innerHTML = "";
}

// ── Push notifications ────────────────────────────────────────────────────────
async function setupPush() {
  if (!("Notification" in window) || !("PushManager" in window)) return;
  if (Notification.permission === "default") {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") return;
  }
  if (Notification.permission !== "granted") return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const keyRes = await fetch(`${API}/chat/push/vapid-public-key`);
    const { key } = await keyRes.json();
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key)
    });
    await fetch(`${API}/chat/push/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ subscription: sub.toJSON() })
    });
  } catch (e) { console.warn("Push setup failed", e); }
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function setupServiceWorker() {
  if (!("serviceWorker" in navigator)) return;
  navigator.serviceWorker.register("/byneat/chatter/sw.js").catch(e => console.warn("SW reg failed", e));
  navigator.serviceWorker.addEventListener("message", e => {
    if (e.data?.type === "OPEN_CHAT" && e.data.chatId) openChat(e.data.chatId);
  });
}

// ── Avatar ────────────────────────────────────────────────────────────────────
async function loadAvatar(fileId, container) {
  try {
    const url = await resolveFile(fileId);
    const img = document.createElement("img");
    img.src = url;
    img.alt = "avatar";
    img.style.cssText = "width:100%;height:100%;object-fit:cover;border-radius:50%";
    container.innerHTML = "";
    container.appendChild(img);
  } catch {}
}

function changeAvatar() {
  document.getElementById("avatar-file-input").click();
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  showToast("Subiendo foto...");
  const formData = new FormData();
  formData.append("file", file);
  try {
    const res = await fetch(`${API}/chat/telegram/upload`, {
      method: "POST",
      headers: { Authorization: "Bearer " + token },
      body: formData
    });
    const data = await res.json();
    if (!data.telegramFileId) { showToast("Error subiendo foto"); return; }
    await fetch(`${API}/chat/me`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ avatarFileId: data.telegramFileId })
    });
    currentUser.avatarFileId = data.telegramFileId;
    const url = await resolveFile(data.telegramFileId);
    document.getElementById("profile-avatar-img").src = url;
    document.getElementById("profile-avatar-img").style.display = "block";
    document.getElementById("profile-avatar-initials").style.display = "none";
    renderSidebarUser();
    showToast("Foto actualizada");
  } catch { showToast("Error actualizando foto"); }
  input.value = "";
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function loadUsers() {
  if (currentUser.role !== "admin") return;
  try {
    const res = await fetch(`${API}/chat/users`, { headers: { Authorization: "Bearer " + token } });
    allUsers = await res.json();
  } catch {}
}

function filterUsers(q) {
  const list = document.getElementById("user-select-list");
  const myId = currentUser.userId || currentUser.username;
  const filtered = allUsers.filter(u =>
    (u._id?.toString() !== myId && u.username !== currentUser.username) &&
    (!q || u.username.toLowerCase().includes(q.toLowerCase()))
  );
  list.innerHTML = filtered.map(u => `
    <div class="user-select-item${selectedUsers.includes(u._id?.toString() || u.username) ? " selected" : ""}"
      onclick="toggleUser('${u._id || u.username}', '${esc(u.username)}')">
      <input type="checkbox" ${selectedUsers.includes(u._id?.toString() || u.username) ? "checked" : ""} onclick="event.stopPropagation()">
      <div class="user-avatar-sm">${u.username[0].toUpperCase()}</div>
      <div>
        <div style="font-size:13px;font-weight:500">${esc(u.username)}</div>
        <div style="font-size:11px;color:var(--text3)">${esc(u.email || "")}</div>
      </div>
    </div>`).join("");
}

function toggleUser(id, username) {
  const idx = selectedUsers.indexOf(id);
  if (idx === -1) selectedUsers.push(id);
  else selectedUsers.splice(idx, 1);
  filterUsers(document.querySelector("#modal-new-chat input[type=text]")?.value || "");
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openNewChat() {
  selectedUsers = [];
  document.getElementById("new-chat-type").value = "direct";
  document.getElementById("new-chat-name").value = "";
  document.getElementById("group-name-field").style.display = "none";
  filterUsers("");
  document.getElementById("modal-new-chat").classList.add("visible");
}

function toggleGroupName() {
  document.getElementById("group-name-field").style.display =
    document.getElementById("new-chat-type").value === "group" ? "block" : "none";
}

async function createChat() {
  if (!selectedUsers.length) { showToast("Seleccioná al menos un usuario"); return; }
  const type = document.getElementById("new-chat-type").value;
  const name = document.getElementById("new-chat-name").value.trim();
  if (type === "group" && !name) { showToast("Ponele un nombre al grupo"); return; }
  try {
    const res = await fetch(`${API}/chat/chats`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ name: name || null, type, participants: selectedUsers })
    });
    const chat = await res.json();
    closeModal("modal-new-chat");
    await loadChats();
    openChat(chat._id);
  } catch { showToast("Error creando chat"); }
}

function openProfile() {
  document.getElementById("profile-username-display").value = currentUser.username;
  document.getElementById("profile-email").textContent = currentUser.email || "";
  const badge = document.getElementById("profile-role-badge");
  badge.textContent = currentUser.role === "admin" ? "Admin" : "Usuario";
  badge.className = `role-badge ${currentUser.role}`;
  document.getElementById("profile-bio").value = currentUser.bio || "";
  const initials = document.getElementById("profile-avatar-initials");
  initials.textContent = currentUser.username[0].toUpperCase();
  const img = document.getElementById("profile-avatar-img");
  if (currentUser.avatarFileId) {
    resolveFile(currentUser.avatarFileId).then(url => {
      img.src = url; img.style.display = "block"; initials.style.display = "none";
    });
  } else { img.style.display = "none"; initials.style.display = "block"; }
  document.getElementById("modal-profile").classList.add("visible");
}

async function saveProfile() {
  if (currentUser.role === "admin") { closeModal("modal-profile"); return; }
  const bio = document.getElementById("profile-bio").value.trim();
  try {
    await fetch(`${API}/chat/me`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ bio })
    });
    currentUser.bio = bio;
    closeModal("modal-profile");
    showToast("Perfil guardado");
  } catch { showToast("Error guardando perfil"); }
}

function openChatInfo() {
  if (!activeChat) return;
  document.getElementById("chat-info-title").textContent = chatName(activeChat);
  const body = document.getElementById("chat-info-body");
  const participants = activeChat.participants || [];
  body.innerHTML = `
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">${participants.length} participante${participants.length !== 1 ? "s" : ""}</p>
    ${participants.map(p => {
      const u = allUsers.find(u => u._id?.toString() === p || u.username === p);
      const name = u ? u.username : p;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)">
        <div class="user-avatar-sm">${name[0]?.toUpperCase()}</div>
        <div>
          <div style="font-size:13px;font-weight:500">${esc(name)}</div>
          ${u?.email ? `<div style="font-size:11px;color:var(--text3)">${esc(u.email)}</div>` : ""}
        </div>
      </div>`;
    }).join("")}`;
  document.getElementById("modal-chat-info").classList.add("visible");
}

function closeModal(id) {
  document.getElementById(id).classList.remove("visible");
}

// ── Image viewer ──────────────────────────────────────────────────────────────
function openImgViewer(url) {
  document.getElementById("img-viewer-img").src = url;
  document.getElementById("img-viewer").classList.add("visible");
}
function closeImgViewer() {
  document.getElementById("img-viewer").classList.remove("visible");
}

const verifiedCache = {};
async function isVerified(username) {
  if (verifiedCache[username] !== undefined) return verifiedCache[username];
  try {
    const r = await fetch(`${API}/chat/users/${username}/verified`);
    const d = await r.json();
    verifiedCache[username] = d.verified;
    return d.verified;
  } catch { return false; }
}

function verifiedBadge() {
  return `<img src="https://www.fidelizador.com/wp-content/uploads/2024/02/CHECK-AZUL-1.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;margin-left:3px" title="Verificado">`;
}
 
// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function fmtTime(d) {
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  if (diff < 86400000 && date.getDate() === now.getDate())
    return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (diff < 604800000)
    return date.toLocaleDateString([], { weekday: "short" });
  return date.toLocaleDateString([], { day: "2-digit", month: "2-digit" });
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1048576) return Math.round(bytes / 1024) + " KB";
  return (bytes / 1048576).toFixed(1) + " MB";
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if (token) checkToken();
</script>
