<!DOCTYPE html>
<html>
<head>
<script>
const parts = location.pathname.split('/').filter(Boolean);
const uIdx = parts.indexOf('u');
const username = uIdx !== -1 ? parts[uIdx + 1] : new URLSearchParams(location.search).get('u');
if (!username) { location.href = '/u/'; }
else {
  fetch('https://neat-apps-b.vercel.app/u/' + username + '/web')
    .then(r => {
      if (!r.ok) throw new Error();
      return r.text();
    })
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(() => {
      document.body.innerHTML = '<p style="font-family:sans-serif;padding:20px;color:#999">Sin página personalizada.</p>';
    });
}
</script>
</head>
<body></body>
</html>
