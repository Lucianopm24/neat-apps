<!DOCTYPE html>
<html>

  <meta http-equiv="refresh" content="3; url=/play/">

<body>
  <p>Redirigiendo a la nueva versión...</p>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
  </script>
</body>
